<style>
  :root{
    --pitch:#0b6b3f; --pitch-2:#0a5733; --pitch-deep:#063d24;
    --gold:#d9a93a; --gold-lite:#f6df9a; --gold-deep:#9a7414;
    --scarlet:#d2253b; --ink:#10231a; --muted:#6c7d74;
    --bg:#eef2ef; --card:#ffffff; --line:#dde5e0;
    --falta-bg:#e7ece9; --falta-tx:#9aa9a1; --falta-bd:#cbd6cf;
    --colada-bg:#0b8457; --colada-bg2:#0a6e49; --colada-tx:#ffffff;
    --rep-tx:#5b4406;
    --r:14px; --tap:48px;
    --shadow:0 1px 2px rgba(8,40,26,.08), 0 4px 16px rgba(8,40,26,.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    padding-bottom:90px;
    line-height:1.4;
  }
  button{font-family:inherit; cursor:pointer}
  :focus-visible{outline:3px solid var(--scarlet); outline-offset:2px; border-radius:6px}

  /* ===== HEADER / PAINEL ===== */
  header{
    position:sticky; top:0; z-index:50;
    background:linear-gradient(135deg,var(--pitch) 0%, var(--pitch-2) 70%, var(--pitch-deep) 100%);
    color:#fff; padding:10px 12px calc(8px + env(safe-area-inset-top,0px));
    padding-top:calc(10px + env(safe-area-inset-top,0px));
    box-shadow:0 6px 18px rgba(6,40,24,.28);
  }
  .h-top{display:flex; align-items:center; gap:8px}
  .h-title{font-size:.82rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; opacity:.95}
  .h-title b{color:var(--gold-lite)}
  .pct{margin-left:auto; font-size:1.5rem; font-weight:900; line-height:1; font-variant-numeric:tabular-nums}
  .pct small{font-size:.7rem; font-weight:700; opacity:.8; margin-left:2px}
  .bar{height:9px; border-radius:99px; background:rgba(255,255,255,.18); margin:8px 0 7px; overflow:hidden}
  .bar > i{display:block; height:100%; width:0%;
    background:linear-gradient(90deg,var(--gold-lite),var(--gold)); transition:width .35s ease}
  .stats{display:flex; gap:6px; font-size:.72rem; font-weight:700}
  .stats span{flex:1; background:rgba(255,255,255,.12); border-radius:9px; padding:5px 6px; text-align:center;
    font-variant-numeric:tabular-nums}
  .stats span b{display:block; font-size:1.05rem; font-weight:900}
  .s-falta b{color:#ffd9dd} .s-colada b{color:#bff3da} .s-rep b{color:var(--gold-lite)}

  .controls{display:flex; gap:7px; margin-top:9px}
  .mode-btn{
    flex:0 0 auto; border:none; border-radius:11px; padding:0 12px; height:var(--tap);
    font-weight:800; font-size:.78rem; color:#fff; background:rgba(255,255,255,.16);
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .mode-btn .big{font-size:1.1rem}
  .mode-btn.remove{background:var(--scarlet)}
  .search{flex:1; position:relative}
  .search input{
    width:100%; height:var(--tap); border:none; border-radius:11px; padding:0 12px 0 36px;
    font-size:.95rem; background:#fff; color:var(--ink);
  }
  .search::before{content:"🔎"; position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:.95rem; opacity:.6}
  .search .clr{position:absolute; right:6px; top:50%; transform:translateY(-50%);
    border:none; background:#eef2ef; border-radius:50%; width:30px; height:30px; font-size:1rem; display:none}

  .tabs{display:flex; gap:6px; margin-top:9px}
  .tab{flex:1; border:none; border-radius:11px 11px 0 0; height:42px; font-weight:800; font-size:.8rem;
    background:rgba(255,255,255,.12); color:#dff1e7}
  .tab.active{background:var(--bg); color:var(--pitch)}
  .tab .n{display:inline-block; min-width:18px; font-variant-numeric:tabular-nums; opacity:.85; font-weight:900}

  /* ===== CONTEÚDO ===== */
  main{padding:12px 10px 0; max-width:760px; margin:0 auto}
  .view{display:none} .view.active{display:block}

  .toolbar{display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap}
  .mini-btn{border:1px solid var(--line); background:var(--card); border-radius:10px; padding:8px 11px;
    font-weight:700; font-size:.78rem; color:var(--ink); min-height:40px}
  .mini-btn.solid{background:var(--pitch); color:#fff; border-color:var(--pitch)}
  .mini-btn.danger{color:var(--scarlet); border-color:#f0c4ca}

  .block{background:var(--card); border:1px solid var(--line); border-radius:var(--r); margin-bottom:12px;
    box-shadow:var(--shadow); overflow:hidden}
  .block.hide{display:none}
  .grp-head{display:flex; align-items:center; gap:9px; padding:12px 13px; width:100%; border:none;
    background:linear-gradient(180deg,#fbfdfc,#f4f8f5); text-align:left}
  .grp-head .ico{font-size:1.25rem}
  .grp-head .ttl{font-weight:900; font-size:.95rem; letter-spacing:.01em}
  .grp-head .meta{margin-left:auto; text-align:right; font-size:.72rem; color:var(--muted); font-weight:700;
    font-variant-numeric:tabular-nums; display:flex; flex-direction:column; align-items:flex-end; gap:3px}
  .grp-head .meta .mbar{width:64px; height:6px; border-radius:99px; background:var(--falta-bd); overflow:hidden}
  .grp-head .meta .mbar i{display:block; height:100%; background:linear-gradient(90deg,var(--gold),var(--pitch)); width:0%}
  .grp-head .chev{font-size:.8rem; color:var(--muted); transition:transform .2s}
  .block.collapsed .grp-body{display:none}
  .block.collapsed .chev{transform:rotate(-90deg)}

  .team{padding:8px 11px 12px; border-top:1px solid var(--line)}
  .team:first-child{border-top:none}
  .team-head{display:flex; align-items:center; gap:8px; margin:2px 0 9px}
  .team-head .flag{font-size:1.25rem}
  .team-head .nm{font-weight:800; font-size:.86rem}
  .team-head .ab{font-size:.7rem; color:var(--muted); font-weight:800; background:#eef2ef; padding:2px 6px; border-radius:6px}
  .team-head .tmeta{margin-left:auto; font-size:.7rem; color:var(--muted); font-weight:800; font-variant-numeric:tabular-nums}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(58px,1fr)); gap:7px}
  .flat-body{padding:11px}

  /* ===== FIGURINHA ===== */
  .chip{
    position:relative; min-height:var(--tap); border-radius:11px; border:1.5px dashed var(--falta-bd);
    background:var(--falta-bg); color:var(--falta-tx);
    font-weight:800; font-size:.8rem; letter-spacing:.01em; font-variant-numeric:tabular-nums;
    display:flex; align-items:center; justify-content:center; padding:4px 2px; line-height:1.05; text-align:center;
    transition:transform .08s ease, background .15s, color .15s, border-color .15s;
    user-select:none;
  }
  .chip:active{transform:scale(.93)}
  .chip.hide{display:none}
  .chip.colada{
    background:linear-gradient(160deg,var(--colada-bg),var(--colada-bg2)); color:var(--colada-tx);
    border:1.5px solid var(--colada-bg2);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25);
  }
  .chip.colada::after{content:"✓"; position:absolute; top:3px; right:5px; font-size:.62rem; opacity:.85}
  .chip.repetida{
    color:var(--rep-tx); border:1.5px solid var(--gold-deep);
    background:linear-gradient(135deg,#fff3cf 0%,var(--gold-lite) 25%,var(--gold) 50%,#fbe6b0 70%,var(--gold) 100%);
    background-size:180% 180%;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6), 0 1px 4px rgba(154,116,20,.35);
  }
  .chip .badge{position:absolute; top:-6px; right:-6px; background:var(--scarlet); color:#fff;
    font-size:.62rem; font-weight:900; min-width:18px; height:18px; border-radius:99px; padding:0 4px;
    display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .chip .tag{position:absolute; top:2px; left:4px; font-size:.62rem; line-height:1}

  /* ===== LISTAS (faltam / repetidas) ===== */
  .list-sec{margin-bottom:14px}
  .list-sec h3{font-size:.82rem; font-weight:900; margin:0 0 7px; color:var(--pitch-2);
    display:flex; align-items:center; gap:7px}
  .list-sec h3 .c{margin-left:auto; font-size:.72rem; color:var(--muted); font-weight:800}
  .codes{display:flex; flex-wrap:wrap; gap:6px}
  .code{border:1px solid var(--line); background:var(--card); border-radius:9px; padding:7px 9px;
    font-weight:800; font-size:.78rem; color:var(--ink); font-variant-numeric:tabular-nums; min-height:40px;
    display:inline-flex; align-items:center; gap:5px}
  .code small{font-weight:700; color:var(--muted)}

  .rep-row{display:flex; align-items:center; gap:9px; background:var(--card); border:1px solid var(--line);
    border-radius:11px; padding:8px 10px; margin-bottom:7px}
  .rep-row .rc{font-weight:900; font-size:.86rem; min-width:64px; font-variant-numeric:tabular-nums}
  .rep-row .qt{font-weight:900; font-size:.72rem; color:#fff; background:var(--gold-deep);
    border-radius:7px; padding:3px 7px; white-space:nowrap}
  .rep-row input{flex:1; min-width:90px; border:1px solid var(--line); border-radius:9px; height:38px;
    padding:0 9px; font-size:.85rem; background:#fbfdfc}

  .empty{text-align:center; color:var(--muted); padding:34px 16px; font-weight:600}
  .empty .em{font-size:2rem; display:block; margin-bottom:8px}

  .note{font-size:.74rem; color:var(--muted); background:#fff8e6; border:1px solid #f0e2b8;
    border-radius:10px; padding:9px 11px; margin-bottom:11px; line-height:1.45}

  /* ===== TOAST + MODAL ===== */
  .toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:99px; font-weight:700; font-size:.85rem;
    opacity:0; pointer-events:none; transition:.25s; z-index:90; box-shadow:0 8px 24px rgba(0,0,0,.3); max-width:90vw}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  .overlay{position:fixed; inset:0; background:rgba(8,30,20,.5); display:none; align-items:center; justify-content:center;
    z-index:100; padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff; border-radius:18px; padding:22px; max-width:340px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,.35)}
  .modal h2{margin:0 0 8px; font-size:1.05rem}
  .modal p{margin:0 0 18px; color:var(--muted); font-size:.9rem; line-height:1.5}
  .modal textarea{width:100%; height:160px; border:1px solid var(--line); border-radius:10px; padding:10px;
    font-size:.8rem; font-family:ui-monospace,Menlo,Consolas,monospace; resize:vertical; margin-bottom:14px}
  .modal-acts{display:flex; gap:9px}
  .modal-acts button{flex:1; height:46px; border-radius:11px; border:none; font-weight:800; font-size:.9rem}
  .btn-cancel{background:#eef2ef; color:var(--ink)}
  .btn-confirm{background:var(--scarlet); color:#fff}

  @media (max-width:380px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(52px,1fr))}
    .h-title{font-size:.74rem}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="h-title">🏆 Minha Coleção · <b>Panini Copa 2026</b></div>
    <div class="pct" id="pct">0<small>%</small></div>
  </div>
  <div class="bar"><i id="barFill"></i></div>
  <div class="stats">
    <span class="s-colada"><b id="stColada">0</b>coladas</span>
    <span class="s-falta"><b id="stFalta">0</b>faltam</span>
    <span class="s-rep"><b id="stRep">0</b>repetidas</span>
  </div>
  <div class="controls">
    <button class="mode-btn" id="modeBtn" aria-label="Alternar modo de toque">
      <span class="big" id="modeIco">➕</span><span id="modeTxt">Adicionar</span>
    </button>
    <div class="search">
      <input id="search" type="search" inputmode="search" placeholder="Buscar código ou seleção…" aria-label="Buscar figurinha">
      <button class="clr" id="clrSearch" aria-label="Limpar busca">×</button>
    </div>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-view="colecao" role="tab">Coleção</button>
    <button class="tab" data-view="faltam" role="tab">Faltam <span class="n" id="tabFaltaN">0</span></button>
    <button class="tab" data-view="repetidas" role="tab">Repetidas <span class="n" id="tabRepN">0</span></button>
  </div>
</header>

<main>
  <!-- COLEÇÃO -->
  <section class="view active" id="view-colecao">
    <div class="toolbar">
      <button class="mini-btn" id="expandAll">Expandir tudo</button>
      <button class="mini-btn" id="collapseAll">Recolher tudo</button>
      <button class="mini-btn" id="exportBtn">⬇️ Exportar backup</button>
      <button class="mini-btn" id="importBtn">⬆️ Importar backup</button>
      <button class="mini-btn danger" id="resetBtn">🗑️ Zerar tudo</button>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
    </div>
    <div id="collection"></div>
  </section>

  <!-- FALTAM -->
  <section class="view" id="view-faltam">
    <div class="toolbar">
      <button class="mini-btn solid" id="copyFaltam">📋 Copiar lista (WhatsApp)</button>
    </div>
    <div class="note">Toque em qualquer figurinha desta lista para marcá-la como <b>colada</b> na hora.</div>
    <div id="faltamList"></div>
  </section>

  <!-- REPETIDAS -->
  <section class="view" id="view-repetidas">
    <div class="toolbar">
      <button class="mini-btn solid" id="copyRep">📋 Copiar lista (WhatsApp)</button>
    </div>
    <div class="note">Quantidade = quantas você tem <b>sobrando</b> para troca. Use “Reservar para…” pra anotar com quem combinou.</div>
    <div id="repList"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBox" role="dialog" aria-modal="true">
    <h2 id="modalTitle">Tem certeza?</h2>
    <p id="modalText"></p>
    <div id="modalExtra"></div>
    <div class="modal-acts">
      <button class="btn-cancel" id="modalCancel">Cancelar</button>
      <button class="btn-confirm" id="modalOk">Confirmar</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* =========================================================
   DADOS — somente números/códigos (sem nomes de jogadores)
   ========================================================= */
const TEAMS = [
  ["A","MEX","México","🇲🇽"],["A","RSA","África do Sul","🇿🇦"],["A","KOR","Coréia do Sul","🇰🇷"],["A","CZE","Rep. Tcheca","🇨🇿"],
  ["B","CAN","Canadá","🇨🇦"],["B","BIH","Bósnia","🇧🇦"],["B","QAT","Catar","🇶🇦"],["B","SUI","Suíça","🇨🇭"],
  ["C","BRA","Brasil","🇧🇷"],["C","MAR","Marrocos","🇲🇦"],["C","HAI","Haiti","🇭🇹"],["C","SCO","Escócia","🏴󠁧󠁢󠁳󠁣󠁴󠁿"],
  ["D","USA","Estados Unidos","🇺🇸"],["D","PAR","Paraguai","🇵🇾"],["D","AUS","Austrália","🇦🇺"],["D","TUR","Turquia","🇹🇷"],
  ["E","GER","Alemanha","🇩🇪"],["E","CUW","Curaçao","🇨🇼"],["E","CIV","Costa do Marfim","🇨🇮"],["E","ECU","Equador","🇪🇨"],
  ["F","NED","Holanda","🇳🇱"],["F","JPN","Japão","🇯🇵"],["F","SWE","Suécia","🇸🇪"],["F","TUN","Tunísia","🇹🇳"],
  ["G","BEL","Bélgica","🇧🇪"],["G","EGY","Egito","🇪🇬"],["G","IRN","Irã","🇮🇷"],["G","NZL","Nova Zelândia","🇳🇿"],
  ["H","ESP","Espanha","🇪🇸"],["H","CPV","Cabo Verde","🇨🇻"],["H","KSA","Arábia Saudita","🇸🇦"],["H","URU","Uruguai","🇺🇾"],
  ["I","FRA","França","🇫🇷"],["I","SEN","Senegal","🇸🇳"],["I","IRQ","Iraque","🇮🇶"],["I","NOR","Noruega","🇳🇴"],
  ["J","ARG","Argentina","🇦🇷"],["J","ALG","Argélia","🇩🇿"],["J","AUT","Áustria","🇦🇹"],["J","JOR","Jordânia","🇯🇴"],
  ["K","POR","Portugal","🇵🇹"],["K","COD","Congo","🇨🇩"],["K","UZB","Uzbequistão","🇺🇿"],["K","COL","Colômbia","🇨🇴"],
  ["L","ENG","Inglaterra","🏴󠁧󠁢󠁥󠁮󠁧󠁿"],["L","CRO","Croácia","🇭🇷"],["L","GHA","Gana","🇬🇭"],["L","PAN","Panamá","🇵🇦"]
];

function range(prefix,a,b){const o=[];for(let i=a;i<=b;i++)o.push({id:prefix+i,label:prefix+i,shield:false,photo:false});return o;}

// Estrutura de blocos
const BLOCKS = [];
BLOCKS.push({key:"abertura", kind:"flat", icon:"🏆", title:"Abertura · FIFA World Cup History",
  stickers:[{id:"00",label:"00",shield:false,photo:false}].concat(range("FWC",1,19))});

const GROUP_LETTERS = [...new Set(TEAMS.map(t=>t[0]))];
GROUP_LETTERS.forEach(g=>{
  const teams = TEAMS.filter(t=>t[0]===g).map(t=>{
    const code=t[1];
    const stickers=[];
    for(let n=1;n<=20;n++) stickers.push({id:code+n,label:code+n,shield:n===1,photo:n===13});
    return {code, name:t[2], flag:t[3], stickers};
  });
  BLOCKS.push({key:"grupo"+g, kind:"group", icon:"⚽", title:"Grupo "+g, teams});
});

BLOCKS.push({key:"cocacola", kind:"flat", icon:"🥤", title:"Coca-Cola", stickers:range("CC",1,14)});
BLOCKS.push({key:"especiais", kind:"flat", icon:"✨", title:"Especiais Metalizadas",
  note:"Códigos genéricos E1–E68. Quando você tiver os números reais do álbum, dá pra renomear depois.",
  stickers:range("E",1,68)});

// Índices auxiliares
const ALL = [];            // {id,label,blockKey,teamCode,teamName,searchText}
const ID_INFO = {};        // id -> info
const BLOCK_IDS = {};      // blockKey -> [ids]
const TEAM_IDS = {};       // teamCode -> [ids]
BLOCKS.forEach(b=>{
  BLOCK_IDS[b.key]=[];
  if(b.kind==="flat"){
    b.stickers.forEach(s=>{
      const info={id:s.id,label:s.label,blockKey:b.key,blockTitle:b.title,teamCode:null,teamName:null,
        shield:s.shield,photo:s.photo,searchText:(s.id+" "+b.title).toLowerCase()};
      ALL.push(info); ID_INFO[s.id]=info; BLOCK_IDS[b.key].push(s.id);
    });
  } else {
    b.teams.forEach(t=>{
      TEAM_IDS[t.code]=[];
      t.stickers.forEach(s=>{
        const info={id:s.id,label:s.label,blockKey:b.key,blockTitle:b.title,teamCode:t.code,teamName:t.name,
          shield:s.shield,photo:s.photo,searchText:(s.id+" "+t.name+" "+t.code+" "+b.title).toLowerCase()};
        ALL.push(info); ID_INFO[s.id]=info; BLOCK_IDS[b.key].push(s.id); TEAM_IDS[t.code].push(s.id);
      });
    });
  }
});
const TOTAL = ALL.length; // 1062

/* =========================================================
   ESTADO + PERSISTÊNCIA (window.storage)
   ========================================================= */
const STORE_KEY = "panini_copa_2026";
let state = { v:1, counts:{}, reserves:{}, mode:"add", collapsed:{} };

// Salvamento em 3 camadas:
//  cloud  -> window.storage (dentro do app/site do Claude, vinculado à conta)
//  local  -> localStorage  (arquivo .html baixado e aberto no navegador do aparelho)
//  memory -> só durante a sessão (último recurso; use Exportar backup)
let storageMode = "memory";
const cloudPresent = (typeof window.storage !== "undefined" && window.storage);

// Só confia na nuvem se uma GRAVAÇÃO real funcionar (no celular dentro do Claude ela pode falhar).
async function cloudWorks(){
  if(!cloudPresent) return false;
  try{ await window.storage.set("__panini_probe", "1", false); return true; }
  catch(e){ return false; }
}
function localWorks(){
  try{ localStorage.setItem("__panini_test","1"); localStorage.removeItem("__panini_test"); return true; }
  catch(_){ return false; }
}
function applyLoaded(d){
  state.counts   = d.counts   || {};
  state.reserves = d.reserves || {};
  state.mode     = d.mode     || "add";
  state.collapsed= d.collapsed|| {};
}
async function loadState(){
  if(await cloudWorks()){
    storageMode="cloud";
    try{ const r=await window.storage.get(STORE_KEY,false); if(r&&r.value) applyLoaded(JSON.parse(r.value)); }
    catch(e){ /* chave inexistente = começa vazio */ }
    return;
  }
  if(localWorks()){
    storageMode="local";
    try{ const v=localStorage.getItem(STORE_KEY); if(v) applyLoaded(JSON.parse(v)); }catch(e){}
    return;
  }
  storageMode="memory";
}
let saveTimer=null;
// Salva e, se a camada atual falhar, REBAIXA sozinho para a próxima (sem erro na tela).
async function doSave(){
  const json = JSON.stringify(state);
  if(storageMode==="cloud"){
    try{ await window.storage.set(STORE_KEY, json, false); return; }
    catch(e){ storageMode = localWorks() ? "local" : "memory"; }
  }
  if(storageMode==="local"){
    try{ localStorage.setItem(STORE_KEY, json); return; }
    catch(e){ storageMode = "memory"; }
  }
  // memory: nada a fazer (backup manual é a rede de segurança)
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ doSave(); },350);
}

const getCount = id => state.counts[id] || 0;
function setCount(id,c){
  c=Math.max(0,c|0);
  if(c===0) delete state.counts[id]; else state.counts[id]=c;
  if(c<2 && state.reserves[id]) delete state.reserves[id]; // sem repetida, sem reserva
  scheduleSave();
}

/* =========================================================
   RENDER — COLEÇÃO
   ========================================================= */
const elCollection = document.getElementById("collection");
const chipEls = {}; // id -> button

function chipHTML(s){
  const tag = s.shield ? '<span class="tag" title="Escudo brilhante">🛡️</span>'
            : s.photo  ? '<span class="tag" title="Foto do time">👥</span>' : '';
  return `<button class="chip" data-id="${s.id}" type="button" aria-label="Figurinha ${s.label}">
            ${tag}<span class="lbl">${s.label}</span><span class="badge" hidden></span>
          </button>`;
}

function buildCollection(){
  let html="";
  BLOCKS.forEach(b=>{
    const collapsed = state.collapsed[b.key] ? " collapsed":"";
    html += `<div class="block${collapsed}" data-block="${b.key}">
      <button class="grp-head" type="button" data-toggle="${b.key}">
        <span class="ico">${b.icon}</span>
        <span class="ttl">${b.title}</span>
        <span class="meta">
          <span data-meta="${b.key}">0/${BLOCK_IDS[b.key].length}</span>
          <span class="mbar"><i data-mbar="${b.key}"></i></span>
        </span>
        <span class="chev">▾</span>
      </button>
      <div class="grp-body">`;
    if(b.kind==="flat"){
      if(b.note) html += `<div class="flat-body" style="padding-bottom:0"><div class="note">${b.note}</div></div>`;
      html += `<div class="flat-body"><div class="grid">`;
      b.stickers.forEach(s=> html += chipHTML(s));
      html += `</div></div>`;
    } else {
      b.teams.forEach(t=>{
        html += `<div class="team" data-team="${t.code}">
          <div class="team-head">
            <span class="flag">${t.flag}</span>
            <span class="nm">${t.name}</span>
            <span class="ab">${t.code}</span>
            <span class="tmeta" data-tmeta="${t.code}">0/20</span>
          </div><div class="grid">`;
        t.stickers.forEach(s=> html += chipHTML(s));
        html += `</div></div>`;
      });
    }
    html += `</div></div>`;
  });
  elCollection.innerHTML = html;
  document.querySelectorAll(".chip").forEach(el=> chipEls[el.dataset.id]=el);
  document.querySelectorAll(".chip").forEach(el=> applyChip(el.dataset.id));
}

function applyChip(id){
  const el = chipEls[id]; if(!el) return;
  const c = getCount(id);
  el.classList.remove("colada","repetida");
  const badge = el.querySelector(".badge");
  if(c>=2){ el.classList.add("repetida"); badge.hidden=false; badge.textContent="+"+(c-1); }
  else { badge.hidden=true; if(c===1) el.classList.add("colada"); }
  const info=ID_INFO[id];
  const st = c===0?"falta":(c===1?"colada":("repetida, "+(c-1)+" sobrando"));
  el.setAttribute("aria-label",`Figurinha ${info.label} — ${st}`);
}

/* =========================================================
   SUMÁRIO / PROGRESSO
   ========================================================= */
function computeStats(){
  let colada=0, rep=0;
  for(const id in state.counts){ const c=state.counts[id]; if(c>=1)colada++; if(c>=2)rep+=(c-1); }
  return {colada, falta:TOTAL-colada, rep};
}
function blockColada(key){ let n=0; BLOCK_IDS[key].forEach(id=>{ if(getCount(id)>=1)n++; }); return n; }
function teamColada(code){ let n=0; TEAM_IDS[code].forEach(id=>{ if(getCount(id)>=1)n++; }); return n; }

function refreshSummary(){
  const s=computeStats();
  const pct = TOTAL? Math.round(s.colada/TOTAL*100):0;
  document.getElementById("pct").innerHTML = pct+'<small>%</small>';
  document.getElementById("barFill").style.width = pct+"%";
  document.getElementById("stColada").textContent=s.colada;
  document.getElementById("stFalta").textContent=s.falta;
  document.getElementById("stRep").textContent=s.rep;
  document.getElementById("tabFaltaN").textContent=s.falta;
  document.getElementById("tabRepN").textContent=s.rep;
  // por bloco
  BLOCKS.forEach(b=>{
    const tot=BLOCK_IDS[b.key].length, got=blockColada(b.key);
    const m=document.querySelector(`[data-meta="${b.key}"]`); if(m)m.textContent=got+"/"+tot;
    const bar=document.querySelector(`[data-mbar="${b.key}"]`); if(bar)bar.style.width=(tot?got/tot*100:0)+"%";
    if(b.kind==="group") b.teams.forEach(t=>{
      const tm=document.querySelector(`[data-tmeta="${t.code}"]`); if(tm)tm.textContent=teamColada(t.code)+"/20";
    });
  });
}

/* =========================================================
   INTERAÇÃO — toque / modo / clique direito
   ========================================================= */
function changeChip(id, dir){
  setCount(id, getCount(id)+dir);
  applyChip(id);
  refreshSummary();
  if(currentView!=="colecao") renderActiveList();
}

elCollection.addEventListener("click", e=>{
  const tgl = e.target.closest("[data-toggle]");
  if(tgl){ const k=tgl.dataset.toggle; const blk=tgl.closest(".block");
    blk.classList.toggle("collapsed");
    state.collapsed[k]=blk.classList.contains("collapsed"); scheduleSave(); return; }
  const chip = e.target.closest(".chip");
  if(chip) changeChip(chip.dataset.id, state.mode==="add"?1:-1);
});
elCollection.addEventListener("contextmenu", e=>{
  const chip=e.target.closest(".chip");
  if(chip){ e.preventDefault(); changeChip(chip.dataset.id,-1); }
});

const modeBtn=document.getElementById("modeBtn");
function renderMode(){
  const add = state.mode==="add";
  modeBtn.classList.toggle("remove",!add);
  document.getElementById("modeIco").textContent = add?"➕":"➖";
  document.getElementById("modeTxt").textContent = add?"Adicionar":"Remover";
}
modeBtn.addEventListener("click",()=>{ state.mode = state.mode==="add"?"remove":"add"; renderMode(); scheduleSave(); });

document.getElementById("expandAll").addEventListener("click",()=>{
  document.querySelectorAll(".block").forEach(b=>b.classList.remove("collapsed"));
  BLOCKS.forEach(b=>state.collapsed[b.key]=false); scheduleSave();
});
document.getElementById("collapseAll").addEventListener("click",()=>{
  document.querySelectorAll(".block").forEach(b=>b.classList.add("collapsed"));
  BLOCKS.forEach(b=>state.collapsed[b.key]=true); scheduleSave();
});

/* =========================================================
   BUSCA
   ========================================================= */
const searchInput=document.getElementById("search");
const clrBtn=document.getElementById("clrSearch");
function applySearch(){
  const q=searchInput.value.trim().toLowerCase();
  clrBtn.style.display = q?"block":"none";
  if(!q){
    document.querySelectorAll(".chip.hide").forEach(c=>c.classList.remove("hide"));
    document.querySelectorAll(".block.hide,.team[hidden]").forEach(el=>{el.classList.remove("hide");el.removeAttribute("hidden");});
    document.querySelectorAll(".block").forEach(b=>{ b.classList.toggle("collapsed", !!state.collapsed[b.dataset.block]); });
    return;
  }
  BLOCKS.forEach(b=>{
    const blk=document.querySelector(`[data-block="${b.key}"]`);
    let blockHas=false;
    if(b.kind==="flat"){
      BLOCK_IDS[b.key].forEach(id=>{
        const hit=ID_INFO[id].searchText.includes(q);
        chipEls[id].classList.toggle("hide",!hit); if(hit)blockHas=true;
      });
    } else {
      b.teams.forEach(t=>{
        let teamHas=false;
        TEAM_IDS[t.code].forEach(id=>{
          const hit=ID_INFO[id].searchText.includes(q);
          chipEls[id].classList.toggle("hide",!hit); if(hit)teamHas=true;
        });
        const teamEl=blk.querySelector(`[data-team="${t.code}"]`);
        teamEl.hidden=!teamHas; if(teamHas)blockHas=true;
      });
    }
    blk.classList.toggle("hide",!blockHas);
    if(blockHas) blk.classList.remove("collapsed");
  });
}
searchInput.addEventListener("input",applySearch);
clrBtn.addEventListener("click",()=>{ searchInput.value=""; applySearch(); searchInput.focus(); });

/* =========================================================
   ABAS
   ========================================================= */
let currentView="colecao";
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  currentView=t.dataset.view;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+currentView).classList.add("active");
  if(currentView!=="colecao") renderActiveList();
  window.scrollTo({top:0});
}));
function renderActiveList(){ if(currentView==="faltam")renderFaltam(); else if(currentView==="repetidas")renderRepetidas(); }

/* =========================================================
   LISTA: FALTAM
   ========================================================= */
const faltamList=document.getElementById("faltamList");
function missingByBlock(){
  const out=[];
  BLOCKS.forEach(b=>{
    if(b.kind==="flat"){
      const miss=BLOCK_IDS[b.key].filter(id=>getCount(id)===0);
      if(miss.length) out.push({title:b.title, icon:b.icon, items:miss});
    } else {
      b.teams.forEach(t=>{
        const miss=TEAM_IDS[t.code].filter(id=>getCount(id)===0);
        if(miss.length) out.push({title:b.title+" · "+t.name+" ("+t.code+")", icon:t.flag, items:miss});
      });
    }
  });
  return out;
}
function renderFaltam(){
  const data=missingByBlock();
  if(!data.length){ faltamList.innerHTML=`<div class="empty"><span class="em">🎉</span>Álbum completo! Não falta nenhuma figurinha.</div>`; return; }
  let html="";
  data.forEach(sec=>{
    html+=`<div class="list-sec"><h3>${sec.icon} ${sec.title}<span class="c">${sec.items.length} faltando</span></h3><div class="codes">`;
    sec.items.forEach(id=>{
      const i=ID_INFO[id];
      const ic=i.shield?" 🛡️":i.photo?" 👥":"";
      html+=`<button class="code" type="button" data-fid="${id}">${id}${ic}</button>`;
    });
    html+=`</div></div>`;
  });
  faltamList.innerHTML=html;
}
faltamList.addEventListener("click",e=>{
  const b=e.target.closest("[data-fid]"); if(!b)return;
  const id=b.dataset.fid;
  setCount(id,1); applyChip(id); refreshSummary();
  b.style.transition="opacity .2s,transform .2s"; b.style.opacity="0"; b.style.transform="scale(.7)";
  setTimeout(()=>renderFaltam(),200);
  toast("Colada: "+id+" ✓");
});
function faltamText(){
  const data=missingByBlock();
  let t="🏆 FALTAM — Panini Copa 2026\n";
  t+="Faltam "+computeStats().falta+" de "+TOTAL+"\n";
  data.forEach(sec=>{ t+="\n"+sec.title+":\n"+sec.items.join(", ")+"\n"; });
  return t.trim();
}

/* =========================================================
   LISTA: REPETIDAS
   ========================================================= */
const repList=document.getElementById("repList");
function repIds(){ return ALL.map(i=>i.id).filter(id=>getCount(id)>=2); }
function renderRepetidas(){
  const ids=repIds();
  if(!ids.length){ repList.innerHTML=`<div class="empty"><span class="em">📭</span>Nenhuma repetida ainda. As que sobrarem aparecem aqui.</div>`; return; }
  let html="";
  ids.forEach(id=>{
    const i=ID_INFO[id], qt=getCount(id)-1;
    const ctx=i.teamName?(i.teamName+" · "+i.blockTitle):i.blockTitle;
    const resv=(state.reserves[id]||"").replace(/"/g,"&quot;");
    html+=`<div class="rep-row" title="${ctx}">
        <span class="rc">${id}</span>
        <span class="qt">${qt}x</span>
        <input type="text" data-rid="${id}" value="${resv}" placeholder="Reservar para…" aria-label="Reservar ${id} para">
      </div>`;
  });
  repList.innerHTML=html;
}
repList.addEventListener("input",e=>{
  const inp=e.target.closest("[data-rid]"); if(!inp)return;
  const id=inp.dataset.rid, v=inp.value.trim();
  if(v) state.reserves[id]=v; else delete state.reserves[id];
  scheduleSave();
});
function repText(){
  const ids=repIds();
  let t="🔁 REPETIDAS PARA TROCA — Panini Copa 2026\n";
  t+="Total de repetidas: "+computeStats().rep+"\n\n";
  ids.forEach(id=>{
    const qt=getCount(id)-1;
    const r=state.reserves[id]?(" — reservada p/ "+state.reserves[id]):"";
    t+=id+" ("+qt+"x)"+r+"\n";
  });
  return t.trim();
}

/* =========================================================
   COPIAR / TOAST / MODAL
   ========================================================= */
const toastEl=document.getElementById("toast"); let toastT=null;
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); clearTimeout(toastT);
  toastT=setTimeout(()=>toastEl.classList.remove("show"),1900); }

async function copyText(txt){
  try{ await navigator.clipboard.writeText(txt); toast("Lista copiada ✓"); }
  catch(e){
    try{ const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); toast("Lista copiada ✓"); }
    catch(_){ showTextModal(txt); }
  }
}
document.getElementById("copyFaltam").addEventListener("click",()=>{
  if(computeStats().falta===0){ toast("Nada faltando 🎉"); return; } copyText(faltamText());
});
document.getElementById("copyRep").addEventListener("click",()=>{
  if(computeStats().rep===0){ toast("Nenhuma repetida ainda"); return; } copyText(repText());
});

// Modal genérico
const overlay=document.getElementById("overlay");
const modalTitle=document.getElementById("modalTitle"), modalText=document.getElementById("modalText");
const modalExtra=document.getElementById("modalExtra"), modalOk=document.getElementById("modalOk"), modalCancel=document.getElementById("modalCancel");
let okHandler=null;
function openModal({title,text,extra="",okLabel="Confirmar",okClass="btn-confirm",onOk=null,showCancel=true}){
  modalTitle.textContent=title; modalText.textContent=text; modalExtra.innerHTML=extra;
  modalOk.textContent=okLabel; modalOk.className=okClass; modalOk.style.display=onOk?"block":"none";
  modalCancel.textContent= showCancel?"Cancelar":"Fechar";
  okHandler=onOk; overlay.classList.add("show");
}
function closeModal(){ overlay.classList.remove("show"); okHandler=null; }
modalCancel.addEventListener("click",closeModal);
modalOk.addEventListener("click",()=>{ if(okHandler)okHandler(); });
overlay.addEventListener("click",e=>{ if(e.target===overlay)closeModal(); });
function showTextModal(txt){
  openModal({title:"Copiar manualmente", text:"Não consegui acessar a área de transferência aqui. Selecione o texto abaixo e copie:",
    extra:`<textarea readonly>${txt.replace(/</g,"&lt;")}</textarea>`, onOk:null, showCancel:false});
  setTimeout(()=>{ const ta=modalExtra.querySelector("textarea"); if(ta){ta.focus(); ta.select();} },50);
}

/* =========================================================
   ZERAR / EXPORTAR / IMPORTAR
   ========================================================= */
document.getElementById("resetBtn").addEventListener("click",()=>{
  openModal({title:"Zerar tudo?", text:"Isso apaga TODAS as marcações, repetidas e reservas. Não dá pra desfazer. Tem certeza?",
    okLabel:"Sim, zerar tudo", okClass:"btn-confirm",
    onOk:()=>{ state.counts={}; state.reserves={}; scheduleSave();
      document.querySelectorAll(".chip").forEach(el=>applyChip(el.dataset.id));
      refreshSummary(); renderActiveList(); closeModal(); toast("Coleção zerada"); }});
});

document.getElementById("exportBtn").addEventListener("click",()=>{
  const data={app:"panini_copa_2026", v:1, exportedAt:new Date().toISOString(),
    counts:state.counts, reserves:state.reserves};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url;
  a.download="panini_copa2026_backup_"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast("Backup exportado ⬇️");
});

const importFile=document.getElementById("importFile");
document.getElementById("importBtn").addEventListener("click",()=>importFile.click());
importFile.addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let d; try{ d=JSON.parse(reader.result); }catch(_){ toast("Arquivo inválido"); importFile.value=""; return; }
    if(!d || typeof d.counts!=="object"){ toast("Backup não reconhecido"); importFile.value=""; return; }
    const c = d.counts||{}, r = d.reserves||{};
    const n = Object.keys(c).filter(id=>ID_INFO[id]).length;
    openModal({title:"Importar e mesclar?", text:`Vou juntar este backup (${n} figurinhas) com o que você já tem, mantendo o maior valor de cada figurinha. Nada é apagado. Continuar?`,
      okLabel:"Importar e mesclar", okClass:"btn-confirm",
      onOk:()=>{
        for(const id in c){ if(ID_INFO[id]){ const v=Math.max(getCount(id), c[id]|0); if(v>0) state.counts[id]=v; } }
        for(const id in r){ if(ID_INFO[id] && !state.reserves[id]) state.reserves[id]=r[id]; }
        scheduleSave();
        document.querySelectorAll(".chip").forEach(el=>applyChip(el.dataset.id));
        refreshSummary(); renderActiveList(); closeModal(); toast("Backup mesclado ✓"); }});
    importFile.value="";
  };
  reader.readAsText(f);
});

/* =========================================================
   INIT
   ========================================================= */
(async function init(){
  await loadState();
  buildCollection();
  renderMode();
  refreshSummary();
  if(storageMode==="memory"){
    openModal({title:"Não consegui salvar neste ambiente", text:"Aqui dentro o armazenamento ficou bloqueado, então as marcações podem se perder ao fechar. Caminho confiável: baixe este arquivo .html e abra no navegador do celular (Safari/Chrome) — ali ele salva no aparelho. E use Exportar backup como segurança.", onOk:null, showCancel:false});
  }
})();
</script>
